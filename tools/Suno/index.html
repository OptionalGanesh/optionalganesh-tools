<script>
let currentMode = 'compress';

function switchTab(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0 && mode==='compress') || (i===1 && mode==='generate')));
  document.getElementById('panel-compress').classList.toggle('active', mode === 'compress');
  document.getElementById('panel-generate').classList.toggle('active', mode === 'generate');
}

function appendTag(t) {
  const el = document.getElementById('input-generate');
  el.value = el.value.trim() ? el.value.trim() + ', ' + t : t;
  el.focus();
}

function setStatus(state, msg) {
  const bar = document.getElementById('status-bar');
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  if (!state) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  dot.className = 'dot ' + state;
  txt.textContent = msg;
}

function charPillClass(n) {
  if (n > 200) return 'char-pill over';
  if (n > 180) return 'char-pill close';
  return 'char-pill';
}

function renderOutput(data) {
  const { prompt, title, style_tags } = data;
  const len = prompt.length;
  document.getElementById('output-area').innerHTML = `
    <div class="output">
      <div class="out-block">
        <div class="out-header">
          <span class="out-label">Prompt Suno</span>
          <div class="out-actions">
            <span class="${charPillClass(len)}">${len}/200</span>
            <button class="copy-btn" onclick="copyText('out-prompt', this)">copiar</button>
          </div>
        </div>
        <div class="out-body" id="out-prompt">${esc(prompt)}</div>
      </div>
      ${title ? `
      <div class="out-block">
        <div class="out-header">
          <span class="out-label">Título sugerido</span>
          <button class="copy-btn" onclick="copyText('out-title', this)">copiar</button>
        </div>
        <div class="out-body" id="out-title">${esc(title)}</div>
      </div>` : ''}
      ${style_tags ? `
      <div class="out-block">
        <div class="out-header">
          <span class="out-label">Style tags (campo Style en Suno)</span>
          <button class="copy-btn" onclick="copyText('out-tags', this)">copiar</button>
        </div>
        <div class="out-body" id="out-tags">${esc(style_tags)}</div>
      </div>` : ''}
      <div class="regen-row">
        <button class="regen-btn" onclick="runGeneration()">↺ Otra versión</button>
        <button class="regen-btn" onclick="runGeneration(true)">↺ Más experimental</button>
      </div>
    </div>`;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function copyText(id, btnEl) {
  const el = document.getElementById(id);
  if (!el) return;
  await navigator.clipboard.writeText(el.textContent);
  if (!btnEl) return;
  const orig = btnEl.textContent;
  btnEl.textContent = '✓';
  setTimeout(() => btnEl.textContent = orig, 1500);
}

function pick(arr, fallback='') {
  if (!arr || !arr.length) return fallback;
  return arr[Math.floor(Math.random() * arr.length)];
}

function unique(arr) {
  return [...new Set(arr.filter(Boolean).map(x => x.trim()).filter(Boolean))];
}

function normalizeSpaces(s) {
  return s.replace(/\s+/g, ' ').replace(/\s+,/g, ',').trim();
}

function extractLine(label, text) {
  const re = new RegExp(label + '\\s*:\\s*(.+)', 'i');
  const m = text.match(re);
  return m ? m[1].trim() : '';
}

function parseBullets(block) {
  return block
    .split('\n')
    .map(l => l.replace(/^\s*[-•]\s*/, '').trim())
    .filter(Boolean);
}

function parseStructuredInput(raw) {
  const text = raw.replace(/\r/g, '');
  const lower = text.toLowerCase();

  const title = extractLine('Title', text);
  const seed = extractLine('Seed', text);
  const concept = extractLine('Concept', text);
  const style = extractLine('Style', text);
  const mood = extractLine('Mood', text);
  const bpm = extractLine('BPM', text);
  const key = extractLine('Key', text);
  const groove = extractLine('Groove', text);
  const focus = extractLine('Focus', text);
  const voiceDirection = extractLine('Voice Direction', text);
  const sunoPrompt = extractLine('Suno Prompt', text);
  const directive = extractLine('Directive', text);

  const coreTexture = extractLine('Core texture', text);
  const secondaryTexture = extractLine('Secondary texture', text);
  const tracesOf = extractLine('Traces of', text);

  const tags = [];

  if (style) tags.push(style);
  if (mood) tags.push(mood);
  if (bpm) tags.push(`${bpm} bpm`);
  if (key) tags.push(key);
  if (groove) tags.push(groove);
  if (focus) tags.push(focus);
  if (coreTexture) tags.push(coreTexture);
  if (secondaryTexture) tags.push(secondaryTexture);
  if (tracesOf) tags.push(tracesOf);

  if (voiceDirection) {
    if (/instrument/i.test(voiceDirection)) tags.push('voice as texture');
    if (/barely audible|barely/i.test(voiceDirection)) tags.push('buried vocals');
    if (/longing/i.test(voiceDirection)) tags.push('yearning vocal tone');
  }

  if (directive) {
    if (/glitch|imperfection/i.test(directive)) tags.push('subtle glitch details');
    if (/human/i.test(directive)) tags.push('human imperfection');
  }

  if (!style && lower.includes('trip-hop')) tags.push('trip-hop');
  if (!mood && lower.includes('melancholic')) tags.push('melancholic');
  if (lower.includes('lo-fi')) tags.push('lo-fi textures');
  if (lower.includes('haunting piano') || lower.includes('piano')) tags.push('haunting piano');
  if (lower.includes('broken beat') || lower.includes('stuttering beat') || lower.includes('disjointed rhythm')) tags.push('broken beats');
  if (lower.includes('ethereal vocal') || lower.includes('whispery') || lower.includes('whisper')) tags.push('ethereal vocals');
  if (lower.includes('vinyl') || lower.includes('hiss')) tags.push('vinyl crackle');
  if (lower.includes('grainy')) tags.push('grainy samples');
  if (lower.includes('distorted synth')) tags.push('distorted synths');
  if (lower.includes('ambient')) tags.push('ominous ambience');
  if (lower.includes('mournful')) tags.push('mournful tone');

  return {
    title,
    seed,
    concept,
    style,
    mood,
    bpm,
    key,
    groove,
    focus,
    coreTexture,
    secondaryTexture,
    tracesOf,
    voiceDirection,
    sunoPrompt,
    directive,
    tags: unique(tags)
  };
}

function compressPrompt(data, styleExtra, moodExtra, moreExp=false) {
  const tags = [...data.tags];

  if (styleExtra) tags.push(styleExtra);
  if (moodExtra) tags.push(moodExtra);

  const replacements = [
    ['b harmonic minor', 'B harmonic minor'],
    ['a harmonic minor', 'A harmonic minor'],
    ['c harmonic minor', 'C harmonic minor'],
    ['d harmonic minor', 'D harmonic minor'],
    ['e harmonic minor', 'E harmonic minor'],
    ['f harmonic minor', 'F harmonic minor'],
    ['g harmonic minor', 'G harmonic minor'],
    ['voice as texture', pick(['voice as texture', 'vocal texture'])],
    ['subtle glitch details', pick(['glitch details', 'subtle glitch'])],
    ['human imperfection', pick(['human imperfection', 'raw imperfections'])],
    ['ethereal vocals', pick(['ethereal vocals', 'ghostly vocals', 'whispered vocals'])],
    ['vinyl crackle', pick(['vinyl crackle', 'vinyl hiss'])],
    ['grainy samples', pick(['grainy samples', 'grainy lo-fi samples'])],
    ['ominous ambience', pick(['ominous ambience', 'dark ambience'])],
    ['mournful tone', pick(['mournful tone', 'yearning tone'])],
    ['broken beats', pick(['broken beats', 'stuttering beats'])],
    ['haunting piano', pick(['haunting piano', 'distorted piano', 'dusty piano'])],
  ];

  let finalTags = tags.map(t => {
    let out = t;
    replacements.forEach(([from, to]) => {
      if (String(out).toLowerCase() === from) out = to;
    });
    return out;
  });

  if (data.sunoPrompt) {
    finalTags.unshift(...data.sunoPrompt.split(',').map(s => s.trim()));
  }

  finalTags = unique(finalTags);

  const priority = [
    data.style,
    data.mood,
    data.bpm ? `${data.bpm} bpm` : '',
    data.key,
    'broken beats',
    'stuttering beats',
    'haunting piano',
    'distorted piano',
    'lo-fi textures',
    'grainy samples',
    'ethereal vocals',
    'ghostly vocals',
    'whispered vocals',
    'vinyl crackle',
    'vinyl hiss',
    'distorted synths',
    'ominous ambience',
    'mournful tone',
    'yearning tone',
    'glitch details',
    'subtle glitch',
    'human imperfection'
  ];

  const ordered = [];
  priority.forEach(p => {
    const found = finalTags.find(t => t.toLowerCase() === String(p).toLowerCase());
    if (found && !ordered.includes(found)) ordered.push(found);
  });
  finalTags.forEach(t => {
    if (!ordered.includes(t)) ordered.push(t);
  });

  if (moreExp) {
    const experimental = unique([
      pick(['degraded tape feel', 'blurred transients', 'unstable ambience']),
      pick(['fractured rhythm', 'ghost harmonics', 'smoked-out atmosphere']),
      pick(['off-balance texture', 'dissolving synths', 'imperfect mix residue'])
    ]);
    experimental.forEach(t => {
      if (!ordered.includes(t)) ordered.push(t);
    });
  }

  let prompt = '';
  for (const tag of ordered) {
    const next = prompt ? `${prompt}, ${tag}` : tag;
    if (next.length <= 200) prompt = next;
  }

  if (!prompt && data.concept) {
    prompt = data.concept.slice(0, 200);
  }

  prompt = normalizeSpaces(prompt);

  return {
    prompt,
    title: makeTitle(data, moreExp),
    style_tags: makeStyleTags(data, styleExtra, moodExtra, moreExp)
  };
}

function makeTitle(data, moreExp=false) {
  if (data.title) {
    if (moreExp) {
      const suffix = pick(['(Alt Cut)', '(Dust Version)', '(Frayed Mix)', '(Night Edit)']);
      const withSuffix = `${data.title} ${suffix}`;
      return withSuffix.length <= 40 ? withSuffix : data.title;
    }
    return data.title;
  }

  const seedBase = data.seed || data.style || 'Untitled';
  const suffixes = moreExp
    ? ['Dust Cut', 'Frayed Signal', 'Broken Bloom', 'Night Static']
    : ['Version', 'Sketch', 'Drop', 'State'];

  return `${seedBase} ${pick(suffixes)}`.trim();
}

function makeStyleTags(data, styleExtra, moodExtra, moreExp=false) {
  let tags = unique([
    data.style,
    moodExtra || data.mood,
    styleExtra,
    data.groove && /broken|stuttering/i.test(data.groove) ? 'broken beats' : '',
    data.coreTexture && /lo-fi|grainy/i.test(data.coreTexture) ? 'lo-fi' : '',
    data.secondaryTexture && /vocal|whisper/i.test(data.secondaryTexture) ? 'ethereal vocals' : '',
    data.tracesOf && /vinyl|hiss/i.test(data.tracesOf) ? 'vinyl' : ''
  ]);

  if (moreExp) tags.push('experimental');
  tags = unique(tags);

  let out = '';
  for (const tag of tags) {
    const next = out ? `${out}, ${tag}` : tag;
    if (next.length <= 60) out = next;
  }
  return out;
}

function generateFromScratch(raw, moreExp=false) {
  const source = raw.trim();
  const bits = source.split(',').map(s => s.trim()).filter(Boolean);

  const detected = unique(bits.map(x => x.toLowerCase()));
  const tags = [];

  detected.forEach(t => {
    if (t.includes('trip-hop')) tags.push('trip-hop');
    else if (t.includes('neo-soul')) tags.push('neo-soul');
    else if (t.includes('glitch')) tags.push('glitch textures');
    else if (t.includes('cinematic')) tags.push('cinematic');
    else if (t.includes('dark ambient')) tags.push('dark ambient');
    else if (t.includes('post-rock')) tags.push('post-rock');
    else if (t.includes('drone')) tags.push('drone');
    else if (t.includes('jazz fusion')) tags.push('jazz fusion');
    else if (t.includes('dub techno')) tags.push('dub techno');
    else if (t.includes('balearic')) tags.push('balearic');
    else if (t.includes('afrobeat')) tags.push('afrobeat');
    else tags.push(t);
  });

  const textures = moreExp
    ? ['fractured textures', 'blurred low end', 'ghost reverb']
    : ['textured production', 'moody atmosphere', 'detailed space'];

  textures.forEach(t => {
    if (!tags.includes(t)) tags.push(t);
  });

  let prompt = '';
  for (const tag of unique(tags)) {
    const next = prompt ? `${prompt}, ${tag}` : tag;
    if (next.length <= 200) prompt = next;
  }

  const titleBase = bits[0] || 'Untitled';
  const title = titleBase
    .split(' ')
    .slice(0, 3)
    .join(' ')
    .replace(/\b\w/g, c => c.toUpperCase());

  let style_tags = '';
  for (const tag of unique(tags)) {
    const next = style_tags ? `${style_tags}, ${tag}` : tag;
    if (next.length <= 60) style_tags = next;
  }

  return {
    prompt: normalizeSpaces(prompt),
    title: moreExp ? `${title} Alt` : title,
    style_tags
  };
}

async function runGeneration(moreExp = false) {
  let inputText = '';

  if (currentMode === 'compress') {
    inputText = document.getElementById('input-compress').value.trim();
    if (!inputText) { setStatus('err', 'Escribe o pega algo primero.'); return; }
  } else {
    inputText = document.getElementById('input-generate').value.trim();
    if (!inputText) { setStatus('err', 'Describe el sonido primero.'); return; }
  }

  const styleExtra = document.getElementById('style-extra')?.value.trim() || '';
  const moodExtra = document.getElementById('mood-extra')?.value.trim() || '';

  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  setStatus('loading', 'Sintetizando prompt...');

  try {
    let result;

    if (currentMode === 'compress') {
      const parsed = parseStructuredInput(inputText);
      result = compressPrompt(parsed, styleExtra, moodExtra, moreExp);
    } else {
      result = generateFromScratch(inputText, moreExp);
    }

    renderOutput(result);
    setStatus('ok', `Listo — ${result.prompt.length} chars`);
    setTimeout(() => setStatus(null), 3000);

  } catch (e) {
    setStatus('err', 'Error: ' + e.message);
    console.error(e);
  }

  btn.disabled = false;
}
</script>
